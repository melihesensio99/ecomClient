
<div class="products-page p-1">
  <div class="d-flex justify-content-between align-items-center mb-2 bg-white p-2 rounded-3 shadow-sm">
    <div class="d-flex align-items-center">
      <mat-icon class="text-primary me-2 ms-1" style="font-size: 20px; width: 20px; height: 20px;">inventory_2</mat-icon>
      <h6 class="fw-bold mb-0 text-primary">Ürün Yönetimi</h6>
    </div>
    <button mat-flat-button color="accent" class="rounded-pill px-3 py-0" style="height: 32px; font-size: 13px;" (click)="showProductQrCodeReading()">
      <mat-icon class="me-1 small-icon">qr_code_scanner</mat-icon> QR Okut
    </button>
  </div>

  <div class="row g-3">
    <!-- Ürün Ekleme Formu -->
    <div class="col-lg-4">
      <app-create (createdProduct)="createdProduct($event)"></app-create>
    </div>

    <!-- Ürün Listesi -->
    <div class="col-lg-8">
      <app-list #list (onEditProduct)="editProduct($event)"></app-list>
    </div>
  </div>
</div>
