<mat-card class="product-list-card border-0 shadow-sm rounded-4 p-0 overflow-hidden">
  <div class="table-container p-0">
    <table mat-table [dataSource]="dataSource" class="w-100">

      <!-- Name -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef class="bg-light fw-bold py-3 text-dark px-3" style="min-width: 150px;"> Ürün Adı </th>
        <td mat-cell *matCellDef="let element" class="py-3 fw-medium px-3"> {{element.name}} </td>
      </ng-container>

      <!-- Stock -->
      <ng-container matColumnDef="stock">
        <th mat-header-cell *matHeaderCellDef class="bg-light fw-bold py-3 text-dark text-center px-2" style="width: 80px;"> Stok </th>
        <td mat-cell *matCellDef="let element" class="py-3 text-center px-2">
          <span class="badge rounded-pill" [ngClass]="element.stock <= 5 ? 'bg-danger bg-opacity-10 text-danger' : 'bg-success bg-opacity-10 text-success'">
            {{element.stock}}
          </span>
        </td>
      </ng-container>

      <!-- Price -->
      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef class="bg-light fw-bold py-3 text-dark text-end px-3" style="width: 120px;"> Fiyat </th>
        <td mat-cell *matCellDef="let element" class="py-3 text-end text-primary fw-bold px-3"> {{element.price | currency:'TRY':'symbol':'1.0-0'}} </td>
      </ng-container>

      <!-- Created Date -->
      <ng-container matColumnDef="createdDate">
        <th mat-header-cell *matHeaderCellDef class="bg-light fw-bold py-3 text-dark px-3 text-center" style="width: 130px;"> Kayıt Tarihi </th>
        <td mat-cell *matCellDef="let element" class="py-3 small text-muted px-3 text-center"> {{element.createdDate | date:'dd.MM.yyyy'}} </td>
      </ng-container>

      <!-- Updated Date -->
      <ng-container matColumnDef="updatedDate">
        <th mat-header-cell *matHeaderCellDef class="bg-light fw-bold py-3 text-dark px-3 text-center" style="width: 130px;"> Güncelleme </th>
        <td mat-cell *matCellDef="let element" class="py-3 small text-muted px-3 text-center"> {{element.updatedDate | date:'dd.MM.yyyy'}} </td>
      </ng-container>

      <!-- Photos -->
      <ng-container matColumnDef="photos">
        <th mat-header-cell *matHeaderCellDef width="50" class="bg-light"></th>
        <td mat-cell *matCellDef="let element" class="text-center px-1">
          <button mat-icon-button color="primary" (click)="addProductImages(element.id)" matTooltip="Görsel Yönetimi">
            <mat-icon>image</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- QR Code -->
      <ng-container matColumnDef="qrcode">
        <th mat-header-cell *matHeaderCellDef width="50" class="bg-light"></th>
        <td mat-cell *matCellDef="let element" class="text-center px-1">
          <button mat-icon-button color="accent" (click)="showQRCode(element.id)" matTooltip="QR Kod Oluştur">
            <mat-icon>qr_code</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- Edit -->
      <ng-container matColumnDef="edit">
        <th mat-header-cell *matHeaderCellDef width="50" class="bg-light"></th>
        <td mat-cell *matCellDef="let element" class="text-center px-1">
          <button mat-icon-button class="text-info" (click)="editProduct(element)" matTooltip="Düzenle">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- Delete -->
      <ng-container matColumnDef="delete">
        <th mat-header-cell *matHeaderCellDef style="width: 50px;" class="bg-light"></th>
        <td mat-cell *matCellDef="let element" appDelete [id]="element.id" (callback)="getProducts()" controller="products" class="text-center">
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns" style="height: 40px;"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="row-hover" style="height: 48px;"></tr>
    </table>

    <mat-paginator (page)="pageChanged()" [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons class="bg-light border-top compact-paginator">
    </mat-paginator>
  </div>
</mat-card>
