<mat-card class="product-create-card border-0 shadow-sm rounded-3 p-2">
  <div class="mb-2 px-1">
    <h6 class="fw-bold text-primary mb-0">Ürün Ekle</h6>
  </div>

  <div class="row g-2">
    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100 compact-form-field">
        <mat-label>Ürün Adı</mat-label>
        <input matInput #txtName placeholder="...">
        <mat-icon matSuffix class="text-muted small-icon">label</mat-icon>
      </mat-form-field>
    </div>

    <div class="col-6">
      <mat-form-field appearance="outline" class="w-100 compact-form-field">
        <mat-label>Stok</mat-label>
        <input matInput type="number" min="0" value="0" #txtStock>
      </mat-form-field>
    </div>

    <div class="col-6">
      <mat-form-field appearance="outline" class="w-100 compact-form-field">
        <mat-label>Fiyat (₺)</mat-label>
        <input matInput type="number" min="0" value="0" #txtPrice>
      </mat-form-field>
    </div>
  </div>

  <div class="mt-2 text-center">
    <app-file-upload [options]="fileUploadOptions"></app-file-upload>
  </div>

  <div class="mt-2 px-1">
    <button mat-flat-button color="primary" class="rounded-pill w-100 py-1" style="height: 36px;" (click)="create(txtName, txtStock, txtPrice)" *ngIf="!selectedProductId">
      <mat-icon class="me-1 small-icon">save</mat-icon> Kaydet
    </button>
    <button mat-flat-button color="accent" class="rounded-pill w-100 py-1" style="height: 36px;" (click)="update(txtName, txtStock, txtPrice)" *ngIf="selectedProductId">
      <mat-icon class="me-1 small-icon">edit</mat-icon> Güncelle
    </button>
  </div>
</mat-card>
